# Deterministic internal-only SSRF target.
# Reachable from the chain network as http://internal-only/secret-internal-only
# but NEVER exposed to the host (no compose `ports:` mapping). Gives the SSRF
# attack a reproducible internal resource to reach for.
server {
  listen 80 default_server;
  server_name _;

  location = /secret-internal-only {
    add_header Content-Type "application/json" always;
    return 200 '{"flag":"SSRF-INTERNAL-PWNED","note":"this should never reach an external client"}';
  }
  location / { return 404; }
}
