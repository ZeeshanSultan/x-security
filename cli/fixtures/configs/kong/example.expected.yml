        strip_path: false
        preserve_host: true
        plugins:
          - name: jwt
            config:
              claims_to_verify:
                - exp
              key_claim_name: iss
              run_on_preflight: true
            tags:
              - jwks=https___auth.example.com_.well-known_jwks.json
              - issuer=https___auth.example.com_
              - audience=api.example.com
            id: 990e034b-01a0-5e39-a2ae-ec550243abc2
          - name: acl
            config:
              allow:
                - admin
                - super-admin
              hide_groups_header: true
            id: bdc84e4c-ffa0-5f22-b301-8f78f92982b4
          - name: rate-limiting
            config:
              minute: 90
              limit_by: consumer
              policy: local
              fault_tolerant: true
              hide_client_headers: false
            tags:
              - x-security-per-route-ratelimit_listUsers
            id: bdcd26da-b770-57a9-9d41-9ab59f6cf8a7
          - name: ip-restriction
            config:
              allow:
                - 10.0.0.0/8
            id: d2034015-17a2-53d6-9752-00ef662787a6
          - name: response-transformer
            config:
              add:
                headers:
                  - Cache-Control:no-store
                  - Pragma:no-cache
            id: b0182517-0d94-5929-87f4-251b1f319650
    read_timeout: 10000
