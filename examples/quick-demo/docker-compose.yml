name: quick-demo

# Self-contained Kong -> Coraza -> vAPI chain for the before/after demo.
# Everything it needs is in this directory:
#  1. vapi BUILDS from vapi.Dockerfile (pins upstream roottusk/vapi).
#  2. coraza rule mount is a relative path under ./policy/coraza/.
#  3. kong config mount is the committed with-coraza variant at ./policy/kong.yml.
# No absolute paths, no prebuilt images, no out-of-tree mounts — `docker
# compose up` works on a fresh clone.
#
# Harness path contract (verified against harness/*.sh):
#   - kong loads /kong/kong.yml (ro mount below) directly via the image's
#     default entrypoint + KONG_DECLARATIVE_CONFIG — no CMD wrapper.
#   - preflight-coraza.sh hardcodes
#     /etc/modsecurity.d/owasp-crs/rules/zzz-x-security.conf and requires marker
#     rule id:408999. policy/coraza/x-security-include.conf carries that
#     marker (appended by scripts/regen-policy.sh), so we mount it at the
#     zzz-x-security.conf path the harness checks.
#   - preflight-vapi.sh expects /var/www/html/vapi/{.env,artisan}; both are
#     baked into the image by vapi.Dockerfile, so no source bind-mount is needed.

services:

  # One-shot. The vapi image bakes /vapi-seed/vapi.sql (copied from
  # upstream's database/vapi.sql in vapi.Dockerfile's source stage). We
  # copy that file into the `vapi_seed` named volume, which vapi-db then
  # mounts RO at /docker-entrypoint-initdb.d. MySQL auto-imports any .sql
  # there on FIRST init only (empty data dir) — so the seed runs on a
  # fresh `down -v && up`, not on restarts. Without this the vapi-db is empty
  # and every route 500's ("Table 'vapi.a_p_i1_users' doesn't exist").
  # `php artisan migrate` is not a fallback — upstream's `flags` migration has
  # a column-name bug.
  vapi-seed:
    image: vapi-www:quick-demo
    command: ["cp", "/vapi-seed/vapi.sql", "/seed/vapi.sql"]
    volumes:
      - vapi_seed:/seed
    networks: [chain]
    restart: "no"

  vapi-db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: vapi
      MYSQL_USER: vapi
      MYSQL_PASSWORD: vapi123456
      MYSQL_ROOT_PASSWORD: vapi123456
    volumes:
      - vapi_db_data:/var/lib/mysql
      # RO: MySQL only reads init-dir files on first init (empty data
      # dir). vapi-seed writes the dump before vapi-db starts, so it's
      # present for that first-init import.
      - vapi_seed:/docker-entrypoint-initdb.d:ro
    networks: [chain]
    depends_on:
      vapi-seed:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pvapi123456"]
      interval: 5s
      timeout: 3s
      retries: 20

  vapi:
    build:
      context: .
      dockerfile: vapi.Dockerfile
    image: vapi-www:quick-demo
    environment:
      APP_NAME: Laravel
      APP_ENV: local
      APP_KEY: "base64:JUXTsCKQubRlvxGv6sVwkFL2rJ/gSksD4B/68948Mww="
      APP_DEBUG: "true"
      APP_URL: http://vapi
      DB_CONNECTION: mysql
      DB_HOST: vapi-db
      DB_PORT: "3306"
      DB_DATABASE: vapi
      DB_USERNAME: root
      DB_PASSWORD: vapi123456
      LOG_CHANNEL: errorlog
      # PHP's built-in dev server (the image CMD) reads SERVER_PORT to pick
      # the listen port. See vapi.Dockerfile for why artisan-serve (not
      # apache2-foreground) is the runtime.
      SERVER_PORT: "80"
    volumes:
      - ./harness/preflight-vapi.sh:/usr/local/bin/preflight-vapi.sh:ro
    entrypoint: ["/bin/bash", "/usr/local/bin/preflight-vapi.sh"]
    command: ["php", "/var/www/html/vapi/artisan", "serve", "--host=0.0.0.0", "--port=80"]
    depends_on:
      vapi-db:
        condition: service_healthy
    networks: [chain]
    ports:
      - "8000:80"
    # php artisan serve is single-threaded; under attack-burst traffic the
    # worker can get SIGKILL'd. unless-stopped brings it back without masking
    # a real crash loop (compose still reports repeated restarts).
    restart: unless-stopped

  # Internal-only SSRF target. NO `ports:` mapping — unreachable from the
  # host, reachable inside the chain network as http://internal-only/.
  internal-only:
    image: nginx:alpine
    volumes:
      - ./ssrf-target/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks: [chain]

  coraza:
    image: owasp/modsecurity-crs:nginx
    environment:
      BACKEND: "http://vapi:80"
      SERVER_NAME: "_"
      MODSEC_RULE_ENGINE: "On"
      MODSEC_AUDIT_LOG: "/dev/stdout"
      MODSEC_AUDIT_ENGINE: "RelevantOnly"
      PARANOIA: "1"
      ANOMALY_INBOUND: "5"
      ANOMALY_OUTBOUND: "4"
      NGINX_ALWAYS_TLS_REDIRECT: "off"
      PORT: "8080"
    volumes:
      # The bundled setup.conf Include-globs
      # /etc/modsecurity.d/owasp-crs/rules/*.conf, so a file mounted there is
      # picked up on every (re)start with zero entrypoint hacks. The zzz-
      # prefix forces load order AFTER CRS so x-security overrides win.
      #
      # Mount path is dictated by preflight-coraza.sh, which hardcodes
      # zzz-x-security.conf and greps for marker rule id:408999. That marker lives
      # in x-security-include.conf, so we mount it at the zzz-x-security.conf
      # path the harness verifies.
      - ./policy/coraza/x-security-include.conf:/etc/modsecurity.d/owasp-crs/rules/zzz-x-security.conf:ro
      - ./harness/preflight-coraza.sh:/usr/local/bin/preflight-coraza.sh:ro
    entrypoint: ["/bin/sh", "/usr/local/bin/preflight-coraza.sh"]
    command: ["nginx", "-g", "daemon off;"]
    depends_on: [vapi]
    # nginx resolves `upstream vapi` once at boot; if vapi hasn't bound :80
    # yet we crash and retry. on-failure covers the race without an explicit
    # healthcheck on vAPI.
    restart: on-failure:5
    networks: [chain]
    ports:
      - "8080:8080"

  kong:
    image: kong:3.4
    environment:
      KONG_DATABASE: "off"
      # Kong loads this declarative config directly (mounted ro below); the
      # image's default entrypoint honors KONG_DECLARATIVE_CONFIG in DB-less
      # mode. No CMD wrapper.
      KONG_DECLARATIVE_CONFIG: "/kong/kong.yml"
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_LOG_LEVEL: "warn"
      KONG_PLUGINS: "bundled"
      # Declare the shared_dict the pre-function BOLA cache uses. Declarative
      # kong.yml cannot set nginx-level directives; this env var threads
      # through Kong's template into `lua_shared_dict ...`.
      KONG_NGINX_HTTP_LUA_SHARED_DICT: "x_security_bola_cache 10m"
      # Kong's untrusted_lua sandbox rejects `require` by default. The BOLA
      # pre-function uses cjson.safe + resty.http (both Kong-bundled).
      KONG_UNTRUSTED_LUA_SANDBOX_REQUIRES: "cjson.safe,resty.http"
    volumes:
      - ./policy/kong.yml:/kong/kong.yml:ro
    command: ["kong", "docker-start"]
    depends_on: [coraza]
    networks: [chain]
    ports:
      - "18000:8000"
      - "18001:8001"

  # One-shot. Reads consumers.json and POSTs to Kong admin so runtime
  # consumer-add/revoke tests have a known starting state. In DB-less mode
  # (KONG_DATABASE=off above) the provisioner self-detects `database":"off"`
  # and exits 0 without mutating anything — kong.yml is authoritative. The
  # sidecar is retained because the same harness drives the DB-backed mode
  # in other fixtures; here it is a graceful no-op.
  kong-consumer-provisioner:
    image: alpine:3.19
    volumes:
      - ./harness/kong-consumer-provisioner.sh:/provisioner.sh:ro
      - ./consumers.json:/kong/consumers.json:ro
    environment:
      KONG_ADMIN: "http://kong:8001"
      CONSUMERS_FILE: "/kong/consumers.json"
    # alpine:3.19 + apk add gives the curl+jq+openssl surface area the
    # provisioner needs; stays within the "no custom-built images" constraint.
    entrypoint: ["sh", "-c", "apk add --no-cache curl jq openssl >/dev/null && sh /provisioner.sh"]
    depends_on: [kong]
    networks: [chain]
    restart: "no"

networks:
  chain:
    driver: bridge

volumes:
  vapi_db_data:
  vapi_seed:
