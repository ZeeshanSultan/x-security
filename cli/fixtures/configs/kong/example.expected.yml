            tags:
              - jwks=https___auth.example.com_.well-known_jwks.json
            id: feb1ea1f-d492-5f65-8c76-5413c202ca30
          - name: rate-limiting
            config:
              minute: 60
              limit_by: consumer
              policy: local
              fault_tolerant: true
