services:
  - name: svc_api1_create_user
    url: http://coraza:8080
    routes:
      - name: route_api1_create_user
        paths:
          - /vapi/api1/user
        methods:
          - POST
        strip_path: false
        preserve_host: true
        plugins:
          - name: rate-limiting
            config:
              minute: 30
              limit_by: ip
              policy: local
              fault_tolerant: true
              hide_client_headers: false
            tags:
              - x-security-per-route-ratelimit_api1-create-user
            id: 7671ea7b-cd62-5f9d-a763-3eb92d88f9ec
          - name: request-size-limiting
            config:
              allowed_payload_size: 1
              size_unit: megabytes
              require_content_length: false
            id: c4618cb4-b018-5fd7-864e-72421c02a3c4
  - name: svc_api1_get_user_by_id
    url: http://coraza:8080
    routes:
      - name: route_api1_get_user_by_id
        paths:
          - ~/vapi/api1/user/[^/]+
        methods:
          - GET
        strip_path: false
        preserve_host: true
        plugins:
          - name: jwt
            config:
              claims_to_verify:
                - exp
              key_claim_name: iss
              run_on_preflight: true
              header_names:
                - Authorization-Token
            tags:
              - jwks=https___idp.example.com_.well-known_jwks.json
            id: ce5a70c0-7878-5e28-92c4-a6a1058d7bc5
          - name: pre-function
            config:
              access:
                - >
                  -- x-security K-1 BOLA pre-function for endpoint=api1-get-user-by-id

                  local cjson = require("cjson.safe")

                  local principal = (kong.ctx.shared.authenticated_credential and
                  kong.ctx.shared.authenticated_credential.username) or (kong.ctx.shared.authenticated_jwt_token and
                  kong.ctx.shared.authenticated_jwt_token.sub)

                  if not principal then
                    kong.log.warn("[x-security-rule-bola-403] no authenticated principal; denying")
                    return kong.response.exit(401, {message = "x-security: no authenticated principal", tag = "x-security-rule-bola-403"})
                  end


                  -- W10-11: shared_dict cache (key=principal:resource_id, TTL=60s)

                  local ss_cache = ngx.shared.x_security_bola_cache

                  local ss_resource_id = tostring(kong.request.get_path_arg("id") or "")

                  local ss_cache_key = tostring(principal) .. ":" .. ss_resource_id

                  local ss_cached_owner = ss_cache and ss_cache:get(ss_cache_key) or nil

                  local ss_resource = nil

                  if ss_cached_owner ~= nil then
                    kong.log.warn("[x-security-bola] cache_hit key=" .. ss_cache_key .. " owner=" .. tostring(ss_cached_owner))
                    ss_resource = { ownerId = ss_cached_owner, _ss_cached = true }
                  else
                    -- resource lookup: /users/{id} (identifier from request.params.id)
                    kong.log.warn("[x-security-bola] cache_miss key=" .. ss_cache_key)
                    local ok_req, http = pcall(require, "resty.http")
                    if not ok_req then
                      kong.log.warn("[x-security-rule-bola-403] resty.http not available; failing closed")
                      return kong.response.exit(403, {message = "x-security: resource access denied", tag = "x-security-rule-bola-403", reason = "resty_http_missing"})
                    end
                    local httpc = http.new()
                    httpc:set_timeout(2000)
                    local lookup_url = "/users/" .. tostring(kong.request.get_path_arg("id") or "")
                    local ok_call, res = pcall(function()
                      return httpc:request_uri(lookup_url, {
                        method = "GET",
                        headers = {
                          ["Authorization"] = kong.request.get_header("Authorization"),
                          ["X-x-security-Internal"] = "rule-lookup"
                        },
                        ssl_verify = false
                      })
                    end)
                    if not ok_call or not res or res.status ~= 200 then
                      kong.log.warn("[x-security-bola] resource lookup failed status=" .. tostring(res and res.status or "no_response"))
                      return kong.response.exit(403, {message = "x-security: resource access denied", tag = "x-security-rule-bola-403", reason = "lookup_failed"})
                    end
                    local ok_decode, body = pcall(cjson.decode, res.body or "{}")
                    if not ok_decode or type(body) ~= "table" then
                      kong.log.warn("[x-security-bola] decode failed for " .. lookup_url)
                      return kong.response.exit(403, {message = "x-security: invalid resource response", tag = "x-security-rule-bola-403", reason = "decode_failed"})
                    end
                    ss_resource = body
                    if ss_cache and body.ownerId ~= nil then
                      ss_cache:set(ss_cache_key, tostring(body.ownerId), 60)
                    end
                  end

                    -- rule 1: resource.ownerId equals ${jwt.sub}
                    if tostring((ss_resource and ss_resource["ownerId"])) ~= tostring((kong.ctx.shared.authenticated_credential and kong.ctx.shared.authenticated_credential.username) or (kong.ctx.shared.authenticated_jwt_token and kong.ctx.shared.authenticated_jwt_token.sub)) then
                      kong.log.warn("[x-security-rule-bola-403] rule 1 (resource.ownerId equals) denied")
                      return kong.response.exit(403, {
                        message = "x-security: BOLA denied",
                        tag = "x-security-rule-bola-403",
                        rule = 1
                      })
                    end
            tags:
              - x-security-rule-bola-403
            id: 4cf33311-0667-546f-813f-95262afe78d7
          - name: rate-limiting
            config:
              minute: 180
              limit_by: consumer
              policy: local
              fault_tolerant: true
              hide_client_headers: false
            tags:
              - x-security-per-route-ratelimit_api1-get-user-by-id
            id: 842a023b-a3aa-551a-8273-b58899ee4323
