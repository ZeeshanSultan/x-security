policies:
  default:
    mode: prevent-learn
    practices:
      - x-security-threat-prevention
      - x-security-rate-limit
    triggers:
      - x-security-log-trigger
    custom-response: x-security-blocked-response
  specific-rules:
    - name: x-security-asset-vapi
      host: vapi
      practices:
        - x-security-threat-prevention
        - x-security-rate-limit
practices:
  - name: x-security-threat-prevention
    type: threat-prevention
  - name: x-security-rate-limit
    type: rate-limit
log-triggers:
  - name: x-security-log-trigger
custom-responses:
  - name: x-security-blocked-response
x-security-extended:
  schema-validation:
    - name: get-api1-user-by-id
      binding:
        method: GET
        path: /vapi/api1/user/{id}
        operationId: api1-user-by-id
    - name: post-api3-create-user
      binding:
        method: POST
        path: /vapi/api3/user
        operationId: api3-create-user
