# XSecurity Kong generator — deployment=standalone edition=oss
# 2 spec→runtime divergence(s) recorded below.
# WARNING: rateLimit.policy (endpoint=listUsers): declared="cluster (per-identity intent)" emitted="local" — rate-limit limit_by=consumer uses policy=local by default; counters are scoped per-Kong-instance and not shared. For true per-identity buckets across instances, run Kong in database mode and pass `--kong-policy cluster`, or add a redis store and use policy=redis.
# WARNING: rateLimit.policy (endpoint=uploadFile): declared="cluster (per-identity intent)" emitted="local" — rate-limit limit_by=consumer uses policy=local by default; counters are scoped per-Kong-instance and not shared. For true per-identity buckets across instances, run Kong in database mode and pass `--kong-policy cluster`, or add a redis store and use policy=redis.
